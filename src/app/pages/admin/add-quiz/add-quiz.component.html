<div class="aq-page">

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-header-left">
      <h1 class="page-title">Add New Quiz</h1>
      <p class="page-subtitle">Create a quiz and assign it to a category</p>
    </div>
    <div class="header-badge" *ngIf="role === 'SCHOOL_ADMIN'">
      <span>🏫</span> School Quiz
    </div>
  </div>

  <!-- Form Card -->
  <div class="form-card">
    <form (ngSubmit)="addQuiz()" autocomplete="off">

      <!-- Title -->
      <div class="form-group">
        <label class="form-label">Quiz Title <span class="required">*</span></label>
        <input
          [(ngModel)]="quizData.title"
          name="title"
          type="text"
          placeholder="Enter quiz title"
          class="form-input"
        />
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea
          [(ngModel)]="quizData.description"
          name="description"
          placeholder="Enter quiz description (optional)"
          class="form-input form-textarea"
          rows="4"
        ></textarea>
      </div>

      <!-- Marks + Questions Row -->
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Maximum Marks</label>
          <input
            [(ngModel)]="quizData.maxMarks"
            name="maxMarks"
            type="number"
            placeholder="e.g. 100"
            class="form-input"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Number of Questions</label>
          <input
            [(ngModel)]="quizData.numberOfQuestions"
            name="numberOfQuestions"
            type="number"
            placeholder="e.g. 10"
            class="form-input"
          />
        </div>
      </div>

      <!-- Category -->
      <div class="form-group">
        <label class="form-label">Category <span class="required">*</span></label>
        <select [(ngModel)]="quizData.category.cid" name="category" class="form-select">
          <option value="">-- Select Category --</option>
          <option *ngFor="let c of categories" [value]="c.cid">{{ c.title }}</option>
        </select>
        <p *ngIf="categories.length === 0" class="no-cat-hint">
          No categories found.
          <a routerLink="/admin/add-category">Add a category first →</a>
        </p>
      </div>

      <!-- Publish Toggle -->
      <div class="form-group toggle-group">
        <label class="form-label">Publish Status</label>
        <label class="toggle-switch">
          <input type="checkbox" [(ngModel)]="quizData.active" name="active" />
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">{{ quizData.active ? 'Published' : 'Draft' }}</span>
      </div>

      <!-- Submit -->
      <div class="form-actions">
        <button type="submit" class="submit-btn" [disabled]="loading">
          <span *ngIf="!loading">✅ Add Quiz</span>
          <span *ngIf="loading" class="spinner-inline"></span>
        </button>
      </div>

    </form>
  </div>

</div>
