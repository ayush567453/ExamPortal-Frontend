<div class="tf-wrapper">
  <div class="tf-header">
    <h1>{{ isEdit ? '✏️ Edit School' : '🏫 Add New School' }}</h1>
    <a routerLink="/super-admin/tenants" class="btn-back">← Back to List</a>
  </div>

  <div class="form-card">
    <div class="form-grid">
      <div class="form-group">
        <label>School Name *</label>
        <input [(ngModel)]="form.schoolName" placeholder="e.g. Delhi Public School" class="input"/>
      </div>
      <div class="form-group">
        <label>Tenant Code *</label>
        <input [(ngModel)]="form.tenantCode" placeholder="e.g. DPS001" class="input" [disabled]="isEdit"/>
      </div>
      <div class="form-group full">
        <label>Address</label>
        <input [(ngModel)]="form.address" placeholder="Full address" class="input"/>
      </div>
      <div class="form-group">
        <label>Contact Number</label>
        <input [(ngModel)]="form.contactNumber" placeholder="+91 98XXXXXXXX" class="input"/>
      </div>
      <div class="form-group">
        <label>School Email *</label>
        <input [(ngModel)]="form.email" type="email" placeholder="school@example.com" class="input"/>
      </div>
    </div>

    <div class="section-divider">
      <span>Admin Account</span>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Admin Username *</label>
        <input [(ngModel)]="form.adminUsername" placeholder="admin_username" class="input"/>
      </div>
      <div class="form-group">
        <label>Admin Email</label>
        <input [(ngModel)]="form.adminEmail" type="email" placeholder="admin@school.com" class="input"/>
      </div>
      <div class="form-group" *ngIf="!isEdit">
        <label>Admin Password *</label>
        <input [(ngModel)]="form.adminPassword" type="password" placeholder="Min 8 characters" class="input"/>
      </div>
    </div>

    <div class="section-divider">
      <span>School Logo</span>
    </div>

    <div class="logo-upload">
      <div class="logo-preview" *ngIf="logoPreview">
        <img [src]="logoPreview" alt="Logo preview"/>
      </div>
      <div class="logo-placeholder" *ngIf="!logoPreview">🏫</div>
      <label class="upload-btn">
        <input type="file" accept="image/*" (change)="onLogoChange($event)" hidden/>
        Choose Logo
      </label>
      <small>PNG/JPG, max 5MB</small>
    </div>

    <div class="form-actions">
      <a routerLink="/super-admin/tenants" class="btn-cancel">Cancel</a>
      <button (click)="submit()" class="btn-submit" [disabled]="saving">
        {{ saving ? 'Saving...' : (isEdit ? 'Update School' : 'Create School') }}
      </button>
    </div>
  </div>
</div>
