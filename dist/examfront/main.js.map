<div class="sidebar-wrap">

  <!-- School/Admin Header -->
  <div class="sidebar-header">
    <div *ngIf="role === 'SCHOOL_ADMIN'" class="school-header">
      <img *ngIf="schoolLogoUrl" [src]="schoolLogoUrl" class="school-logo" alt="logo"/>
      <div *ngIf="!schoolLogoUrl" class="logo-placeholder">🏫</div>
      <div class="school-info">
        <strong>{{ schoolName || 'School Admin' }}</strong>
        <small>{{ adminUsername }}</small>
      </div>
    </div>
    <div *ngIf="role !== 'SCHOOL_ADMIN'" class="admin-header">
      <div class="admin-icon">📚</div>
      <div class="admin-info">
        <strong>Admin Panel</strong>
        <small>{{ adminUsername }}</small>
      </div>
    </div>
  </div>

  <!-- Nav Items -->
  <nav class="sidebar-nav">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.link"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: item.link === '/admin' || item.link === '/school-admin/dashboard' }"
      class="nav-item"
    >
      <span class="nav-icon">{{ item.icon }}</span>
      <span class="nav-label">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Logout -->
  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()">
      🚪 Logout
    </button>
  </div>

</div>
