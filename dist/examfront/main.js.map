<div class="vc-page">

  <div class="page-header">
    <div>
      <h1 class="page-title">Categories</h1>
      <p class="page-subtitle">{{ role === 'SCHOOL_ADMIN' ? 'Your school\'s exam categories' : 'All categories' }}</p>
    </div>
    <a routerLink="/admin/add-category" class="add-btn">➕ Add Category</a>
  </div>

  <div *ngIf="loading" class="loading-box">
    <div class="spinner"></div><span>Loading…</span>
  </div>

  <div *ngIf="!loading && categories.length === 0" class="empty-box">
    <div class="empty-icon">📂</div>
    <p>No categories yet</p>
    <a routerLink="/admin/add-category" class="add-btn-sm">Add your first category</a>
  </div>

  <div *ngIf="!loading && categories.length > 0" class="cat-grid">
    <div class="cat-card" *ngFor="let c of categories">
      <div class="cat-icon">📂</div>
      <div class="cat-body">
        <strong class="cat-title">{{ c.title }}</strong>
        <p class="cat-desc">{{ c.description || 'No description' }}</p>
      </div>
    </div>
  </div>

</div>
