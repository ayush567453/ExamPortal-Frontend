<div class="ac-page">

  <div class="page-header">
    <div>
      <h1 class="page-title">Add Category</h1>
      <p class="page-subtitle">Create a new exam category</p>
    </div>
    <div class="header-badge" *ngIf="role === 'SCHOOL_ADMIN'">
      <span>🏫</span> School Category
    </div>
  </div>

  <div class="form-card">
    <form (ngSubmit)="formSubmit()" autocomplete="off">

      <div class="form-group">
        <label class="form-label">Category Title <span class="required">*</span></label>
        <input
          [(ngModel)]="category.title"
          name="title"
          type="text"
          placeholder="e.g. Mathematics, Science"
          class="form-input"
          autofocus
        />
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea
          [(ngModel)]="category.description"
          name="description"
          placeholder="Brief description of this category (optional)"
          class="form-input form-textarea"
          rows="4"
        ></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="submit-btn" [disabled]="loading">
          <span *ngIf="!loading">➕ Add Category</span>
          <span *ngIf="loading" class="spinner-inline"></span>
        </button>
        <a routerLink="/admin/categories" class="cancel-link">← Back to categories</a>
      </div>

    </form>
  </div>

</div>
